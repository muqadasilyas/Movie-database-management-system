<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap">
</head>
<body>
    <header class="header">
        <h1 class="neon-text">Movie Mania</h1>
        <nav>
            <a href="index.html" class="neon-button">Back to Movies</a>
        </nav>
    </header>

    <main class="container movie-details-page">
        <section class="movie-details-hero">
            <div class="large-poster-container">
                <img id="movie-poster" src="" alt="Movie Poster" class="large-poster">
            </div>
            <div class="movie-hero-info">
                <h2 id="movie-title" class="neon-text"></h2>
                <p id="movie-year" class="info-item"><strong class="neon-text subheading">Year:</strong> <span class="detail-value"></span></p>
                <p id="movie-rating" class="info-item"><strong class="neon-text subheading">Rating:</strong> <span class="rating detail-value"></span></p>
                <p id="movie-revenue" class="info-item"><strong class="neon-text subheading">Box Office:</strong> <span class="detail-value"></span></p>
                <p id="movie-director" class="info-item"><strong class="neon-text subheading">Director:</strong> <span class="detail-value"></span></p>
                <p id="movie-genres" class="info-item"><strong class="neon-text subheading">Genres:</strong> <span class="detail-value"></span></p>
                <p id="movie-actors" class="info-item"><strong class="neon-text subheading">Actors:</strong> <span class="detail-value"></span></p>
            </div>
        </section>

        <section id="movie-details-trailer" class="movie-details-trailer">
            <h3 class="neon-text subheading">Trailer</h3>
            <iframe id="movie-trailer" width="800" height="450" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </section>

        <section class="movie-details-synopsis">
            <h3 class="neon-text subheading">Synopsis</h3>
            <p id="movie-synopsis"></p>
        </section>

        <section class="movie-reviews">
            <h3 class="neon-text subheading">Reviews</h3>
            <div id="reviews-container">
                </div>
            <div class="review-form-wrapper">
                <h4 class="neon-text subheading">Add Your Review</h4>
                <form id="review-form">
                    <input type="hidden" id="movie-id-review" name="movie_id">
                    <div class="form-group">
                        <label for="reviewer-name">Your Name:</label>
                        <input type="text" id="reviewer-name" name="reviewer_name" required>
                    </div>
                    <div class="form-group">
                        <label for="rating">Rating (1-5):</label>
                        <input type="number" id="rating" name="rating" min="1" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="comment">Comment:</label>
                        <textarea id="comment" name="comment" rows="4"></textarea>
                    </div>
                    <button type="submit" class="neon-button">Submit Review</button>
                </form>
                <div id="review-message" class="form-message"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2025 Movie Mania. All rights reserved.</p>
    </footer>
    <script src="movie-details-script.js"></script>
</body>
</html>
