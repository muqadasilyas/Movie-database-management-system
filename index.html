<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Explorer</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="header">
        <canvas id="particleCanvas"></canvas>
        <h1 class="neon-text">MOVIE EXPLORER</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search movies, actors, or genres...">
            <button class="neon-button" id="searchButton">Search</button>
        </div>
        <div class="filter-controls">
            <div class="alphabet-filter">
                <button class="filter-letter active" data-letter="ALL">All</button>
                <button class="filter-letter" data-letter="A">A</button>
                <button class="filter-letter" data-letter="B">B</button>
                <button class="filter-letter" data-letter="C">C</button>
                <button class="filter-letter" data-letter="D">D</button>
                <button class="filter-letter" data-letter="E">E</button>
                <button class="filter-letter" data-letter="F">F</button>
                <button class="filter-letter" data-letter="G">G</button>
                <button class="filter-letter" data-letter="H">H</button>
                <button class="filter-letter" data-letter="I">I</button>
                <button class="filter-letter" data-letter="J">J</button>
                <button class="filter-letter" data-letter="K">K</button>
                <button class="filter-letter" data-letter="L">L</button>
                <button class="filter-letter" data-letter="M">M</button>
                <button class="filter-letter" data-letter="N">N</button>
                <button class="filter-letter" data-letter="O">O</button>
                <button class="filter-letter" data-letter="P">P</button>
                <button class="filter-letter" data-letter="Q">Q</button>
                <button class="filter-letter" data-letter="R">R</button>
                <button class="filter-letter" data-letter="S">S</button>
                <button class="filter-letter" data-letter="T">T</button>
                <button class="filter-letter" data-letter="U">U</button>
                <button class="filter-letter" data-letter="V">V</button>
                <button class="filter-letter" data-letter="W">W</button>
                <button class="filter-letter" data-letter="X">X</button>
                <button class="filter-letter" data-letter="Y">Y</button>
                <button class="filter-letter" data-letter="Z">Z</button>
            </div>
            <div class="filter-group">
                <select id="genreFilter" class="neon-select">
                    <option value="">All Genres</option>
                    <option value="Action">Action</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Animation">Animation</option>
                    <option value="Biographical">Biographical</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Crime">Crime</option>
                    <option value="Drama">Drama</option>
                    <option value="Family">Family</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Horror">Horror</option>
                    <option value="Musical">Musical</option>
                    <option value="Mystery">Mystery</option>
                    <option value="Romance">Romance</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Thriller">Thriller</option>
                    <option value="War">War</option>
                    <option value="Western">Western</option>
                    <option value="Sport">Sport</option>
                    <option value="Documentary">Documentary</option>
                </select>
                <select id="sortBy" class="neon-select">
                    <option value="">Sort By...</option>
                    <option value="title_asc">Title (A-Z)</option>
                    <option value="title_desc">Title (Z-A)</option>
                    <option value="rating_desc">Rating (High to Low)</option>
                    <option value="year_desc">Release Year (Newest)</option>
                    <option value="year_asc">Release Year (Oldest)</option>
                    <option value="revenue_desc">Box Office (High to Low)</option>
                    <option value="revenue_asc">Box Office (Low to High)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="movie-grid" id="movieList"></div>
        <div class="pagination-controls">
            <button class="neon-button pagination-btn" id="prevPage">Previous</button>
            <span id="pageInfo"></span>
            <button class="neon-button pagination-btn" id="nextPage">Next</button>
        </div>
    </div>

    <div class="footer">
        <p>© 2025 Movie Explorer </p>
    </div>

    <div id="movieDetailsModal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="closeModalButton">&times;</span>
            <div id="modal-movie-details">
                </div>
        </div>
    </div>
</body>
</html>
